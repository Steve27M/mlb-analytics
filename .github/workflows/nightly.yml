name: nightly-2026-refresh

# Nightly live-2026 refresh: pull the day's games + closing-line snapshot, rebuild the frozen
# warehouse (reproduces exactly) and the live 2026 warehouse, regenerate the site, commit the
# changed pages. Python-only — the frozen 13 models never refit nightly (metrics.json is committed),
# so no R toolchain is needed. See DECISIONS.md and README.
#
# COLD-START SEEDING (one-time): the nightly relies on a persisted bronze cache so it only pulls the
# 2026 delta. Until that cache exists, a scheduled run crawls 3+ full seasons, exceeds timeout-minutes,
# and is CANCELLED — and a cancelled job skips the cache-save post-step, so the cache never seeds
# (a deadlock). Break it with a manual workflow_dispatch, either:
#   (a) one shot: leave seed_seasons blank, set timeout_minutes high (e.g. 350) so the full cold run
#       finishes and publishes; or
#   (b) safer, in <90-min chunks: run seed_seasons="2023", then "2023,2024", then "2023,2024,2025"
#       (each warms bronze via ingest only, no publish), then let the schedule pick up the 2026 delta.
on:
  schedule:
    - cron: "30 10 * * *"      # ~10:30 UTC (~6:30 ET); Actions cron has jitter, fine for nightly
  workflow_dispatch:
    inputs:
      timeout_minutes:
        description: "Job timeout in minutes. Bump (e.g. 350) for a one-shot cold-seeding run."
        required: false
        default: "90"
      seed_seasons:
        description: "Cache-seeding only: ingest these seasons (e.g. 2023 or 2023,2024) and skip publish. Blank = normal full refresh."
        required: false
        default: ""

permissions:
  contents: write                # the bot commits refreshed docs/ to main -> Pages redeploys

concurrency:
  group: nightly
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ fromJSON(github.event.inputs.timeout_minutes || '90') }}
    steps:
      - uses: actions/checkout@v4

      # bronze/warehouse are gitignored (regenerate, never commit). Persist bronze between runs so
      # ingest pulls only the 2026 delta instead of re-crawling 3+ seasons (idempotent, cache-first).
      # See the COLD-START SEEDING note at the top of this file for how to seed the very first cache.
      - name: Restore bronze cache
        uses: actions/cache@v4
        with:
          path: data/bronze
          key: bronze-${{ github.run_id }}     # always write a fresh entry
          restore-keys: bronze-                # restore the newest prior entry

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install (Python + dbt; no R needed)
        run: |
          pip install uv
          uv sync --extra pipeline

      - name: Refresh
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          # seed_seasons (manual) narrows the crawl for a cache warm-up; otherwise the full frozen+live set.
          MLB_SEASONS: ${{ github.event.inputs.seed_seasons || '2023,2024,2025,2026' }}
          SEED_SEASONS: ${{ github.event.inputs.seed_seasons }}
          MLB_DUCKDB_PATH: data/warehouse.duckdb
          MLB_LIVE_DUCKDB_PATH: data/warehouse_live.duckdb
        run: |
          if [ -n "$SEED_SEASONS" ]; then
            echo "::notice::cache-seeding run for seasons $MLB_SEASONS (ingest only, no land/build/publish)"
            uv run python run.py ingest       # warm bronze; the cache-save post-step then persists it
            exit 0
          fi
          t=$SECONDS
          uv run python run.py ingest        # statsapi/Savant delta + daily closing-line snapshot
          export MLB_RUN_INGEST_SEC=$((SECONDS - t))   # feeds the ops.py SPC series
          uv run python run.py land          # bronze -> frozen warehouse
          t=$SECONDS
          uv run python run.py build         # frozen 2023-25 gold (+ 50 tests, frozen_run snapshot)
          export MLB_RUN_DBT_SEC=$((SECONDS - t))
          uv run python run.py export        # frozen model feeds -> data/gold/*.parquet (sims read these)
          uv run python run.py determinism   # same-input determinism gate (build twice, compare)
          uv run python run.py live          # 2026-only live warehouse (separate DuckDB)
          export MLB_RUN_SHA="${{ github.sha }}"
          uv run python run.py dashboard     # prepare + season_sim + live_sim + ops + build_site

      - name: Commit refreshed site (+ heartbeat keeps the schedule alive off-season)
        if: ${{ github.event.inputs.seed_seasons == '' }}   # seeding runs ingest only; never publish
        run: |
          mkdir -p docs/data
          date -u +"%Y-%m-%dT%H:%M:%SZ" > docs/data/last_run.txt
          git config user.name "diamondiq-bot"
          git config user.email "diamondiq-bot@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "nightly: 2026 refresh $(date -u +%F)"
            git push
          fi

      # $0 pager: a silent cron death is the standard hobby-pipeline failure mode. File/append a
      # GitHub Issue so a red night is impossible to miss (deduped onto one open incident thread).
      - name: File a GitHub Issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          body=$(printf 'The nightly 2026 refresh failed on %s.\n\nRun log: %s\n\nCheck the failing stage; the DLQ drains next run, but a stage-level failure (land/build/parity) blocks publish by design.' "$(date -u +%F)" "$run_url")
          existing=$(gh issue list --search "nightly refresh failing in:title state:open" --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$body"
          else
            gh issue create --title "nightly refresh failing" --body "$body"
          fi
