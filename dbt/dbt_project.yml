name: "mlb_analytics"
version: "0.1.0"
config-version: 2
profile: "mlb_analytics"

model-paths: ["models"]
snapshot-paths: ["snapshots"]
macro-paths: ["macros"]
test-paths: ["tests"]
seed-paths: ["seeds"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

# Frozen analysis seasons: staging filters to these, so the whole validated analysis (incl. pooled
# RE24) stays exactly reproducible even after the live current season lands in bronze. The live
# season is built on a separate track (override this var).
vars:
  analysis_seasons: [2023, 2024, 2025]

# Bronze is produced by the Python ingestion (land.py) and exposed to dbt as sources.
# dbt owns staging -> silver -> gold + snapshots only.
models:
  mlb_analytics:
    staging:
      +schema: staging
      +materialized: view
    silver:
      +schema: silver
      +materialized: view
    gold:
      +schema: gold
      +materialized: table

snapshots:
  mlb_analytics:
    +target_schema: snapshots

seeds:
  mlb_analytics:
    +schema: seeds
